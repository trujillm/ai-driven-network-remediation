name: Deploy Kind cluster
description: Install Kind and create a local Kubernetes cluster

runs:
  using: composite
  steps:
    - name: Clean up any pre-existing Kind cluster
      run: |
        kind delete cluster 2>/dev/null || true
        docker rm -f kind-registry 2>/dev/null || true
      shell: bash

    - name: Install oc client
      run: |
        curl -sSLo oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz
        tar -xf oc.tar.gz -C /usr/local/bin oc
        oc version --client
      shell: bash

    - name: Install Kind
      run: go install sigs.k8s.io/kind@v0.30.0
      shell: bash

    - name: Create Kind cluster with local registry
      run: bash ./scripts/ci/kind-with-registry.sh
      shell: bash

    - name: Print cluster info
      run: oc cluster-info
      shell: bash

    - name: Build local images
      run: make build-all-images REGISTRY=localhost:5001
      shell: bash

    - name: Push local images to the local registry
      run: make push-all-images REGISTRY=localhost:5001 PUSH_EXTRA_ARGS="--tls-verify=false"
      shell: bash

    - name: Create edge namespace with dummy workloads
      run: make deploy-edge-workload EDGE_NAMESPACE=dark-noc-edge
      shell: bash

    - name: Prepare in-cluster kubeconfig for edge namespace
      run: |
        CP_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' kind-control-plane)
        cp "$HOME/.kube/config" /tmp/edge-kubeconfig
        sed -i "s|https://127.0.0.1:[0-9]*|https://${CP_IP}:6443|g" /tmp/edge-kubeconfig
      shell: bash

    - name: Build and push AAP mock image
      run: make build-push-aap-mock REGISTRY=localhost:5001 PUSH_EXTRA_ARGS="--tls-verify=false"
      shell: bash

    - name: Build and push ServiceNow mock image
      run: make build-push-servicenow-mock REGISTRY=localhost:5001 PUSH_EXTRA_ARGS="--tls-verify=false"
      shell: bash

    - name: Helm Install
      run: |
        make helm-install REGISTRY=localhost:5001 ROUTES_ENABLED=false ENABLE_KAFKA_UI=false \
          ENABLE_SERVICENOW_MOCK=true \
          HELM_EXTRA_ARGS="\
            --set-file mcpSecrets.openshift.kubeconfig=/tmp/edge-kubeconfig \
            --set mcp-servers.mcp-servers.noc-lokistack.enabled=false \
            --set mcp-servers.mcp-servers.noc-aap.env.AAP_URL=http://aap-mock.hub.svc:8080 \
            --set mcp-servers.mcp-servers.noc-aap.env.AAP_VERIFY_SSL=false" \
          KAFKA_HELM_EXTRA_ARGS="\
            --set kafka.storage.storageClass=standard \
            --set kafka.storage.size=256Mi \
            --set kafka.retention.hours=1 \
            --set kafka.retention.bytes=10485760 \
            --set kafka.resources.requests.cpu=100m \
            --set kafka.resources.requests.memory=256Mi \
            --set kafka.resources.limits.cpu=500m \
            --set kafka.resources.limits.memory=512Mi \
            --set-string kafka.jvmHeapOpts='-Xmx384m -Xms256m'"
      shell: bash

    - name: Wait for Kafka topics to be created
      run: |
        oc wait --for=condition=complete job/kafka-create-topics -n hub --timeout=120s
      shell: bash

    - name: Wait for MCP pods to be ready
      run: |
        for label in noc-kafka noc-openshift noc-aap noc-slack noc-servicenow; do
          echo "Waiting for ${label}..."
          oc wait --for=condition=Ready pod -l "app.kubernetes.io/name=${label}" -n hub --timeout=120s
        done
      shell: bash

