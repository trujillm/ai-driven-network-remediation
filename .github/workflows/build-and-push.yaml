name: Build and push images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ vars.QUAY_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Validate QUAY_USER variable
        shell: bash
        env:
          QUAY_USER: ${{ vars.QUAY_USER }}
        run: |
          if [ -z "${QUAY_USER}" ]; then
            echo "QUAY_USER variable is missing or empty. Set it in repository or organization variables."
            exit 1
          fi

      - name: Validate QUAY_REPOSITORY variable
        shell: bash
        env:
          QUAY_REPOSITORY: ${{ vars.QUAY_REPOSITORY }}
        run: |
          if [ -z "${QUAY_REPOSITORY}" ]; then
            echo "QUAY_REPOSITORY variable is missing or empty. Set it in repository or organization variables."
            exit 1
          fi

      - name: Validate QUAY_TOKEN secret
        shell: bash
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          if [ -z "${QUAY_TOKEN}" ]; then
            echo "QUAY_TOKEN secret is missing or empty. Set it in repository or organization secrets."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Extract version from Makefile
        id: version
        shell: bash
        run: |
          VERSION=$(make version)
          if [ -z "${VERSION}" ]; then
            echo "Unable to determine VERSION from Makefile"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"
          echo "Using repository: ${REGISTRY}"

      - name: Print image list
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make print-all-images

      - name: Build core images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make build-all-images

      - name: Push core images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make push-all-images

      - name: Build and push AAP mock image
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make build-push-aap-mock

      - name: Build and push ServiceNow mock image
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make build-push-servicenow-mock
