# https://kubernetes.io/docs/concepts/containers/images/
image:
  # registry: quay.io/rh-ai-quickstart  # production registry
  registry: quay.io/ecosystem-appeng
  chatbotService: hub-chatbot-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true

chatbotService:
  replicaCount: 1

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources: {}

  livenessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
