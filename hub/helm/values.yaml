# TODO: Change all imagePullPolicy settings from Always to IfNotPresent before the Helm chart release.

# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  agentService: hub-agent-service
  frontend: noc-frontend
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

global:
  routes:
    enabled: true

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack
  port: "8321"
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true
  # Register MCP servers with LlamaStack one by one.
  mcp-servers:
    noc-openshift:
      uri: http://mcp-noc-openshift:8000/mcp
    noc-kafka:
      uri: http://mcp-noc-kafka:8000/mcp
    noc-aap:
      uri: http://mcp-noc-aap:8000/mcp
    noc-slack:
      uri: http://mcp-noc-slack:8000/mcp
    noc-servicenow:
      uri: http://mcp-noc-servicenow:8000/mcp
  # `make helm-install` enables this model when ADNR_LLM_* vars are provided.
  # The upstream wait-for-models init container expands model URL and token
  # directly in Bash, so these fields must be concrete values.
  models:
    adnr-llm:
      id: ""
      enabled: false
      url: ""
      apiToken: ""
      maxTokens: 4096

ingestionPipeline:
  replicaCount: 1
  vectorStoreName: noc_runbooks
  llamastackHost: adnr-autorag-service
  embeddingModel: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
  chunkSizeTokens: 800
  chunkOverlapTokens: 80
  minio:
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  env:
    mcpOpenshiftUrl: "http://mcp-noc-openshift:8000"
    mcpLokistackUrl: "http://mcp-noc-lokistack:8000"
    mcpKafkaUrl: "http://mcp-noc-kafka:8000"
    mcpAapUrl: "http://mcp-noc-aap:8000"
    mcpSlackUrl: "http://mcp-noc-slack:8000"
    mcpServicenowUrl: "http://mcp-noc-servicenow:8000"
    # TODO: When real ServiceNow credentials are wired, use Secret references
    # (secretKeyRef) rather than plain env values for username/password/API key.
    servicenowUrl: "http://servicenow-mock:8080"
    kafkaBootstrap: "kafka:9092"
    modelApiUrl: "http://llamastack:8321/v1/completions"
    modelName: "granite-4-h-tiny"
    demoTopic: "system-alerts"
    auditTopic: "incident-audit"
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

frontend:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

agentService:
  replicaCount: 1
  granite:
    modelName: "granite-4.0-8b"
  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 10

lokistack:
  name: logging-loki
  namespace: ""   # empty = release namespace; set to e.g. "openshift-logging" if different

# ── MinIO connection (must match hub/infra/minio values) ─────────
minio:
  host: minio
  port: "9000"
  secretName: minio

# ── MCP Secrets ───────────────────────────────────────────────────
# Credentials for MCP servers injected via secretKeyRef.
# Set create: false and create the secrets out-of-band if preferred.
# Override values at install time: --set mcpSecrets.aap.password=...
mcpSecrets:
  openshift:
    create: false
    kubeconfig: ""
  aap:
    create: true
    username: ""
    password: ""
  servicenow:
    create: true
    apiKey: ""
    # Set username + password to enable real ServiceNow basic-auth mode.
    # When both are non-empty and SERVICENOW_MODE is "auto", the MCP server
    # switches from mock (API-key) to real (basic-auth) automatically.
    username: ""
    password: ""

# ── MCP Servers (subchart: mcp-servers) ──────────────────────────
# Deployed via the shared mcp-servers Helm chart from ai-architecture-charts.
# Each server is a FastMCP service exposing tools to the AI remediation agent.
# Set skipRoute: true for Kind/non-OpenShift clusters (CI).
mcp-servers:
  enabled: true
  mcp-servers:
    noc-openshift:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-openshift
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        DEFAULT_NAMESPACE: "dark-noc-edge"
        EDGE_KUBECONFIG: "/kubeconfig/kubeconfig"
      volumes:
        - name: edge-kubeconfig
          secret:
            secretName: noc-openshift-edge-kubeconfig
      volumeMounts:
        - name: edge-kubeconfig
          mountPath: /kubeconfig
          readOnly: true

    noc-lokistack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-lokistack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        LOKI_TLS_VERIFY: "false"
        LOKI_DEFAULT_TENANT: "application"
        LOKI_MAX_LINES: "100"
        LOKI_MAX_LINES_CEILING: "500"
        LOKI_MAX_DURATION: "24h"
        LOKI_QUERY_TIMEOUT: "30"
        LOKI_RETRY_ATTEMPTS: "3"
        LOKI_CA_CERT_PATH: ""
      envSecrets:
        LOKI_URL:
          name: lokistack-config
          key: LOKI_URL
        LOKI_TOKEN:
          name: mcp-lokistack-token
          key: token

    noc-kafka:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-kafka
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        KAFKA_CONSUME_TOPICS: "system-alerts,noc-alerts,remediation-jobs"
        KAFKA_PRODUCE_TOPICS: "remediation-jobs,agent-events,incident-audit"
        KAFKA_BOOTSTRAP: "kafka:9092"

    noc-aap:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-aap
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        AAP_URL: "https://aap.aap.svc"
        AAP_VERIFY_SSL: "true"
      envSecrets:
        AAP_USERNAME:
          name: noc-aap-secret
          key: AAP_USERNAME
        AAP_PASSWORD:
          name: noc-aap-secret
          key: AAP_PASSWORD

    noc-slack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-slack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"

    noc-servicenow:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-servicenow
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        # For a real ServiceNow instance, override at install time:
        #   --set mcp-servers.mcp-servers.noc-servicenow.env.SERVICENOW_URL=https://your-instance.service-now.com
        #   --set mcpSecrets.servicenow.username=admin --set mcpSecrets.servicenow.password=...
        # "auto" mode uses basic-auth when username+password are non-empty, mock otherwise.
        SERVICENOW_URL: "http://servicenow-mock.hub.svc:8080"
        SERVICENOW_MODE: "auto"
      envSecrets:
        SERVICENOW_API_KEY:
          name: noc-servicenow-secret
          key: SERVICENOW_API_KEY
        SERVICENOW_USERNAME:
          name: noc-servicenow-secret
          key: SERVICENOW_USERNAME
        SERVICENOW_PASSWORD:
          name: noc-servicenow-secret
          key: SERVICENOW_PASSWORD

    # Disable default servers from the shared chart
    weather:
      enabled: false
    oracle-sqlcl:
      enabled: false
    github-mcp:
      enabled: false
    openshift-mcp:
      enabled: false
    slack-mcp:
      enabled: false
