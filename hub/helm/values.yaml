# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

global:
  routes:
    enabled: true

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack
  port: "8321"
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true
  # `make helm-install` enables this model when ADNR_LLM_* vars are provided.
  # The upstream wait-for-models init container expands model URL and token
  # directly in Bash, so these fields must be concrete values.
  models:
    adnr-llm:
      id: ""
      enabled: false
      url: ""
      apiToken: ""
      maxTokens: 4096

ingestionPipeline:
  vectorStoreName: noc_runbooks
  minio:
    endpoint: minio:9000
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

minio:
  secret:
    create: true
    user: minio_user
    password: minio_password
    host: minio
    port: "9000"
  sampleFileUpload:
    enabled: false
# ── MCP Secrets ───────────────────────────────────────────────────
# Credentials for MCP servers injected via secretKeyRef.
# Set create: false and create the secrets out-of-band if preferred.
# Override values at install time: --set mcpSecrets.aap.password=...
mcpSecrets:
  openshift:
    create: true
    kubeconfig: ""
  aap:
    create: true
    username: ""
    password: ""
  servicenow:
    create: true
    apiKey: ""

# ── MCP Servers (subchart: mcp-servers) ──────────────────────────
# Deployed via the shared mcp-servers Helm chart from ai-architecture-charts.
# Each server is a FastMCP service exposing tools to the AI remediation agent.
# Set skipRoute: true for Kind/non-OpenShift clusters (CI).
mcp-servers:
  enabled: true
  mcp-servers:
    noc-openshift:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-openshift
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        EDGE_KUBECONFIG: "/kubeconfig/kubeconfig"
      volumes:
        - name: edge-kubeconfig
          secret:
            secretName: noc-openshift-edge-kubeconfig
      volumeMounts:
        - name: edge-kubeconfig
          mountPath: /kubeconfig
          readOnly: true

    noc-lokistack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-lokistack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"

    noc-kafka:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-kafka
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"

    noc-aap:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-aap
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
      envSecrets:
        AAP_USERNAME:
          name: noc-aap-secret
          key: AAP_USERNAME
        AAP_PASSWORD:
          name: noc-aap-secret
          key: AAP_PASSWORD

    noc-slack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-slack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"

    noc-servicenow:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-servicenow
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
      envSecrets:
        SERVICENOW_API_KEY:
          name: noc-servicenow-secret
          key: SERVICENOW_API_KEY

    # Disable default servers from the shared chart
    weather:
      enabled: false
    oracle-sqlcl:
      enabled: false
    github-mcp:
      enabled: false
    openshift-mcp:
      enabled: false
    slack-mcp:
      enabled: false
