# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

global:
  routes:
    enabled: true

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack
  port: "8321"
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true

ingestionPipeline:
  vectorStoreName: noc_runbooks
  minio:
    endpoint: minio:9000
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

minio:
  secret:
    create: true
    user: minio_user
    password: minio_password
    host: minio
    port: "9000"
  sampleFileUpload:
    enabled: false
# ── MCP Servers (subchart: mcp-servers) ──────────────────────────
# Deployed via the shared mcp-servers Helm chart from ai-architecture-charts.
# Each server is a FastMCP service exposing tools to the AI remediation agent.
# Set skipRoute: true for Kind/non-OpenShift clusters (CI).
mcp-servers:
  enabled: true
  mcp-servers:
    noc-openshift:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-openshift
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    noc-lokistack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-lokistack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    noc-kafka:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-kafka
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    noc-aap:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-aap
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    noc-slack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-slack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    noc-servicenow:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-servicenow
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: sse
      imagePullPolicy: IfNotPresent
      env:
        MCP_TRANSPORT: "sse"
        MCP_PORT: "8000"

    # Disable default servers from the shared chart
    weather:
      enabled: false
    oracle-sqlcl:
      enabled: false
    github-mcp:
      enabled: false
    openshift-mcp:
      enabled: false
    slack-mcp:
      enabled: false
