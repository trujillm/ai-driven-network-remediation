# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

global:
  routes:
    enabled: true

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack
  port: "8321"
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true

ingestionPipeline:
  vectorStoreName: noc_runbooks
  minio:
    endpoint: minio:9000
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

minio:
  secret:
    create: true
    user: minio_rag_user
    password: minio_rag_password
    host: minio
    port: "9000"
  sampleFileUpload:
    enabled: false
