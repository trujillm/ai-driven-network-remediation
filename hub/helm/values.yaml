# TODO: Change all imagePullPolicy settings from Always to IfNotPresent before the Helm chart release.

# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  agentService: hub-agent-service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1"

global:
  routes:
    enabled: true

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack
  port: "8321"
  replicaCount: 1
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true
  # `make helm-install` enables this model when ADNR_LLM_* vars are provided.
  # The upstream wait-for-models init container expands model URL and token
  # directly in Bash, so these fields must be concrete values.
  models:
    adnr-llm:
      id: ""
      enabled: false
      url: ""
      apiToken: ""
      maxTokens: 4096

ingestionPipeline:
  replicaCount: 1
  vectorStoreName: noc_runbooks
  minio:
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/hello
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

agentService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 10

lokistack:
  name: logging-loki
  namespace: ""   # empty = release namespace; set to e.g. "openshift-logging" if different

# ── MinIO connection (must match hub/infra/minio values) ─────────
minio:
  host: minio
  port: "9000"
  secretName: minio

# ── MCP Secrets ───────────────────────────────────────────────────
# Credentials for MCP servers injected via secretKeyRef.
# Set create: false and create the secrets out-of-band if preferred.
# Override values at install time: --set mcpSecrets.aap.password=...
mcpSecrets:
  openshift:
    create: false
    kubeconfig: ""
  aap:
    create: true
    username: ""
    password: ""
  servicenow:
    create: true
    apiKey: ""

# ── MCP Servers (subchart: mcp-servers) ──────────────────────────
# Deployed via the shared mcp-servers Helm chart from ai-architecture-charts.
# Each server is a FastMCP service exposing tools to the AI remediation agent.
# Set skipRoute: true for Kind/non-OpenShift clusters (CI).
mcp-servers:
  enabled: true
  mcp-servers:
    noc-openshift:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-openshift
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        DEFAULT_NAMESPACE: "dark-noc-edge"
        EDGE_KUBECONFIG: "/kubeconfig/kubeconfig"
      volumes:
        - name: edge-kubeconfig
          secret:
            secretName: noc-openshift-edge-kubeconfig
      volumeMounts:
        - name: edge-kubeconfig
          mountPath: /kubeconfig
          readOnly: true

    noc-lokistack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-lokistack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        LOKI_TLS_VERIFY: "false"
        LOKI_DEFAULT_TENANT: "application"
        LOKI_MAX_LINES: "100"
        LOKI_MAX_LINES_CEILING: "500"
        LOKI_MAX_DURATION: "24h"
        LOKI_QUERY_TIMEOUT: "30"
        LOKI_RETRY_ATTEMPTS: "3"
        LOKI_CA_CERT_PATH: ""
      envSecrets:
        LOKI_URL:
          name: lokistack-config
          key: LOKI_URL
        LOKI_TOKEN:
          name: mcp-lokistack-token
          key: token

    noc-kafka:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-kafka
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        KAFKA_CONSUME_TOPICS: "system-alerts,noc-alerts,remediation-jobs"
        KAFKA_PRODUCE_TOPICS: "remediation-jobs,agent-events,incident-audit"

    noc-aap:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-aap
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        AAP_URL: "https://aap.aap.svc"
        AAP_VERIFY_SSL: "true"
      envSecrets:
        AAP_USERNAME:
          name: noc-aap-secret
          key: AAP_USERNAME
        AAP_PASSWORD:
          name: noc-aap-secret
          key: AAP_PASSWORD

    noc-slack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-slack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"

    noc-servicenow:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-servicenow
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
      envSecrets:
        SERVICENOW_API_KEY:
          name: noc-servicenow-secret
          key: SERVICENOW_API_KEY

    # Disable default servers from the shared chart
    weather:
      enabled: false
    oracle-sqlcl:
      enabled: false
    github-mcp:
      enabled: false
    openshift-mcp:
      enabled: false
    slack-mcp:
      enabled: false
