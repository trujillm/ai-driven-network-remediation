{{- $servers := index .Values "mcp-servers" "mcp-servers" }}
{{- if and $servers (index $servers "noc-lokistack") ((index $servers "noc-lokistack").enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: lokistack-config
  labels:
    {{- include "hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  LOKI_URL: {{ include "hub.lokiGatewayUrl" . | quote }}
{{- end }}
