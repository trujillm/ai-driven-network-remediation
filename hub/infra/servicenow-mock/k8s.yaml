apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicenow-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicenow-mock
  template:
    metadata:
      labels:
        app: servicenow-mock
    spec:
      containers:
        - name: servicenow-mock
          image: localhost:5001/servicenow-mock:ci
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              value: "demo-api-key-2026"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicenow-mock
spec:
  selector:
    app: servicenow-mock
  ports:
    - port: 8080
      targetPort: 8080
