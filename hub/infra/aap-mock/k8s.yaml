apiVersion: apps/v1
kind: Deployment
metadata:
  name: aap-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aap-mock
  template:
    metadata:
      labels:
        app: aap-mock
    spec:
      containers:
        - name: aap-mock
          image: localhost:5001/aap-mock:ci
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aap-mock
spec:
  selector:
    app: aap-mock
  ports:
    - port: 8080
      targetPort: 8080
