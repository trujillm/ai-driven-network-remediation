{{- if .Values.testLogGenerator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: {{ include "lokistack.namespace" . }}
spec:
  replicas: {{ .Values.testLogGenerator.replicas }}
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
        - name: log-generator
          image: {{ .Values.testLogGenerator.image.repository }}:{{ .Values.testLogGenerator.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date -Iseconds) [LOKITEST] INFO: Application started - network monitoring service v1.0"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] ERROR: BGP peer 10.0.0.1 connection dropped - session reset"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] WARN: Interface eth0 packet loss detected - 15pct drop rate"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] ERROR: Network timeout on route 192.168.1.0/24 - retrying connection"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] INFO: Health check passed - all services operational"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] ERROR: Link flap detected on port GigabitEthernet0/1 - state DOWN"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] CRITICAL: OSPF adjacency lost on router-id 10.0.0.5 - neighbor unreachable"
                sleep {{ .Values.testLogGenerator.interval }}
                echo "$(date -Iseconds) [LOKITEST] INFO: Request abc12345-6789-0abc-def0-123456789abc completed in 42ms"
                sleep {{ .Values.testLogGenerator.interval }}
              done
{{- end }}
