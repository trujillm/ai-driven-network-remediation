apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: {{ .Values.llamaStack.name }}
  labels:
    app.kubernetes.io/name: autorag
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.llamaStack.replicas }}
  server:
    containerSpec:
      resources:
        requests:
          cpu: {{ .Values.llamaStack.resources.requests.cpu | quote }}
          memory: {{ .Values.llamaStack.resources.requests.memory | quote }}
        limits:
          cpu: {{ .Values.llamaStack.resources.limits.cpu | quote }}
          memory: {{ .Values.llamaStack.resources.limits.memory | quote }}
      env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.db | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.passwordSecret.name }}
              key: {{ .Values.postgres.passwordSecret.key }}

        - name: ENABLE_SENTENCE_TRANSFORMERS
          value: "true"
        - name: EMBEDDING_PROVIDER
          value: {{ .Values.embedding.provider | quote }}

        - name: INFERENCE_MODEL
          valueFrom:
            secretKeyRef:
              name: llama-stack-autorag-secret
              key: INFERENCE_MODEL
        - name: VLLM_URL
          valueFrom:
            secretKeyRef:
              name: llama-stack-autorag-secret
              key: VLLM_URL
        - name: VLLM_TLS_VERIFY
          valueFrom:
            secretKeyRef:
              name: llama-stack-autorag-secret
              key: VLLM_TLS_VERIFY
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: llama-stack-autorag-secret
              key: VLLM_API_TOKEN
        - name: VLLM_MAX_TOKENS
          valueFrom:
            secretKeyRef:
              name: llama-stack-autorag-secret
              key: VLLM_MAX_TOKENS

        - name: MILVUS_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: {{ .Values.milvus.secret.name }}
              key: MILVUS_ENDPOINT
        - name: MILVUS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.milvus.secret.name }}
              key: MILVUS_TOKEN
        - name: MILVUS_CONSISTENCY_LEVEL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.milvus.secret.name }}
              key: MILVUS_CONSISTENCY_LEVEL

        - name: FMS_ORCHESTRATOR_URL
          value: "http://localhost"
      name: llama-stack
      port: 8321
    distribution:
      {{- if .Values.llamaStack.distributionImage }}
      image: {{ .Values.llamaStack.distributionImage }}
      {{- else }}
      name: {{ .Values.llamaStack.distributionName }}
      {{- end }}
    storage:
      size: {{ .Values.llamaStack.storage.size }}
